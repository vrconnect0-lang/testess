<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> PAINEL DE ENTREGAS - BLUE SHOP EXPRESS</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Entregas Blue">
    <link rel="apple-touch-icon" href="https://complete-olive-ffsrxsmn.edgeone.app/iconedatela2%20.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="blueshop-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #60a5fa;
            --accent: #f43f5e;
            --bg: #f8fafc;
            --glass: rgba(255, 255, 255, 0.8);
            --success: #10b981;
            --danger: #ef4444;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        .glass { 
            background: var(--glass); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .sidebar-item.active { 
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); 
            color: white; 
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); 
        }

        .btn-premium {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            color: white;
            font-weight: 800;
        }

        .btn-premium:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .nav-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            font-weight: 900;
            min-width: 18px;
            height: 18px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            box-shadow: 0 4px 8px rgba(239, 68, 68, 0.3);
            border: 2px solid white;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        @media (max-width: 768px) {
            #sidebar {
                display: flex !important;
                position: fixed !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                top: auto !important;
                width: 100% !important;
                height: 80px !important;
                flex-direction: row !important;
                z-index: 9999 !important;
                padding: 0 10px !important;
                background: white !important;
                border-top: 1px solid rgba(0,0,0,0.1) !important;
                box-shadow: 0 -5px 20px rgba(0,0,0,0.05) !important;
            }
            
            #sidebar .mb-12, #sidebar .pt-8, #sidebar .mt-auto { display: none !important; }

            #sidebar nav {
                display: flex !important;
                flex-direction: row !important;
                width: 100% !important;
                justify-content: center !important;
                align-items: center !important;
            }

            .sidebar-item {
                flex: 1 !important;
                max-width: 200px;
                flex-direction: column !important;
                align-items: center !important;
                justify-content: center !important;
                padding: 10px 0 !important;
                font-size: 10px !important;
                height: 60px !important;
                color: #64748b !important;
            }

            .sidebar-item i { font-size: 20px !important; margin: 0 !important; }
            .sidebar-item span { display: block !important; }
            .nav-badge { top: 5px; right: 35%; }

            main { padding-bottom: 100px !important; }
        }

        .modal {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px); z-index: 15000;
            display: none; align-items: center; justify-content: center; padding: 16px;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white; width: 100%; max-width: 500px;
            border-radius: 32px; overflow: hidden; position: relative;
        }

        .notification {
            position: fixed; top: 20px; right: 20px; z-index: 20000;
            min-width: 300px; background: white; border-radius: 20px;
            padding: 16px; display: flex; align-items: center; gap: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            transform: translateX(120%); transition: 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .notification.show { transform: translateX(0); }
    </style>
    <script>
        function checkLogin() {
            const passInput = document.getElementById('admin-password');
            const pass = passInput.value;
            if(pass === '123456' || pass === '2025') {
                localStorage.setItem('admin_logged', 'true');
                document.getElementById('login-overlay').classList.add('hidden');
                if (typeof loadAllData === 'function') loadAllData();
            } else {
                const err = document.getElementById('login-error');
                err.classList.remove('hidden');
                passInput.value = "";
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        }
    </script>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <!-- Notification Toast -->
    <div id="notification" class="notification">
        <div id="notification-icon" class="w-10 h-10 rounded-full flex items-center justify-center text-white"></div>
        <div>
            <h4 id="notification-title" class="font-black text-gray-800 text-sm"></h4>
            <p id="notification-message" class="text-xs text-gray-400 font-bold"></p>
        </div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-[11000] bg-slate-950 flex items-center justify-center p-4 overflow-hidden">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/20 blur-[120px] rounded-full"></div>

        <div class="relative w-full max-w-[440px] animate__animated animate__fadeInUp">
            <div class="glass p-10 md:p-12 rounded-[48px] border border-white/10 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.5)] text-center space-y-10">
                <div class="space-y-6">
                    <div class="relative inline-block">
                        <div class="absolute inset-0 bg-blue-500 blur-3xl opacity-30 rounded-full animate-pulse"></div>
                        <img src="https://complete-olive-ffsrxsmn.edgeone.app/iconedatela2%20.png" class="h-24 mx-auto relative z-10 drop-shadow-2xl">
                    </div>
                    <div class="space-y-2">
                        <h2 class="text-3xl font-black text-gray-800 tracking-tight">PAINEL DE <span class="text-blue-600">ENTREGAS</span></h2>
                        <div class="flex items-center justify-center gap-2">
                            <span class="h-[1px] w-8 bg-gray-200"></span>
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]">Acesso Restrito</p>
                            <span class="h-[1px] w-8 bg-gray-200"></span>
                        </div>
                    </div>
                </div>
                <div class="space-y-6">
                    <div class="group relative">
                        <input type="password" id="admin-password" placeholder="••••••" class="w-full pl-8 pr-8 py-6 rounded-[24px] bg-gray-50/50 border-2 border-transparent focus:border-blue-500/20 focus:bg-white focus:ring-4 focus:ring-blue-500/10 text-center text-2xl tracking-[0.8em] font-black text-gray-800 transition-all duration-300 placeholder:tracking-normal placeholder:text-gray-300">
                    </div>
                    <button onclick="checkLogin()" class="btn-premium w-full py-6 rounded-[24px] text-white font-black uppercase tracking-[0.2em] text-xs shadow-[0_20px_40px_-12px_rgba(37,99,235,0.4)] flex items-center justify-center gap-3">
                        <span>Acessar Entregas</span>
                        <i class="fa-solid fa-arrow-right-long"></i>
                    </button>
                    <p id="login-error" class="hidden text-rose-500 text-[10px] font-black uppercase tracking-widest animate__animated animate__shakeX">Senha Incorreta</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar / Bottom Nav -->
    <aside id="sidebar" class="w-full md:w-80 bg-white border-r border-gray-100 flex flex-col p-8 transition-all duration-500">
        <div class="mb-12 pt-8">
            <div class="flex items-center gap-4 px-4">
                <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fa-solid fa-truck-fast text-xl"></i>
                </div>
                <div>
                    <h1 class="font-black text-gray-800 tracking-tighter text-xl">ENTREGAS</h1>
                    <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Gestão de Envios</p>
                </div>
            </div>
        </div>

        <nav class="space-y-3 flex-1">
            <div id="nav-entregas" class="sidebar-item active p-5 rounded-[24px] flex items-center gap-4">
                <i class="fa-solid fa-truck-fast text-xl"></i>
                <span class="font-bold text-sm">Entregas</span>
                <div id="badge-entregas" class="nav-badge hidden">0</div>
            </div>
        </nav>

        <div class="mt-auto pt-8 border-t border-gray-50">
            <button onclick="logout()" class="w-full p-5 rounded-[24px] flex items-center gap-4 text-rose-500 hover:bg-rose-50 transition-all font-bold text-sm">
                <i class="fa-solid fa-power-off text-xl"></i>
                <span>Sair</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 md:p-12 max-w-7xl mx-auto w-full">
        <section id="section-entregas" class="animate__animated animate__fadeIn">
            <div class="flex items-center justify-between mb-12">
                <div>
                    <h2 class="text-3xl font-black text-gray-800 tracking-tight">Gerenciamento de Entregas</h2>
                    <p class="text-gray-400 font-medium mt-1">Pedidos pagos aguardando separação e envio.</p>
                </div>
            </div>

            <div class="mb-8 relative">
                <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                    <i class="fa-solid fa-magnifying-glass text-gray-400"></i>
                </div>
                <input type="text" id="search-entregas" oninput="renderEntregas(this.value)" class="w-full pl-12 pr-5 py-4 rounded-2xl bg-white border border-gray-100 focus:border-blue-500/20 focus:ring-4 focus:ring-blue-500/5 transition-all font-bold text-gray-800" placeholder="Buscar entregas por cliente ou produto...">
            </div>
            
            <div class="mb-8 flex gap-4">
                <button onclick="filterEntregas('pendente')" id="btn-ent-pendente" class="px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-blue-600 text-white shadow-lg shadow-blue-100">Pendentes</button>
                <button onclick="filterEntregas('entregue')" id="btn-ent-entregue" class="px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-white text-gray-400 border border-gray-100">Entregues</button>
            </div>

            <div id="entregas-list" class="grid grid-cols-1 gap-6"></div>
        </section>
    </main>

    <!-- MODAL: DETALHES DO PEDIDO -->
    <div id="modal-pedido" class="modal">
        <div class="modal-content animate__animated animate__zoomIn">
            <div class="bg-emerald-500 p-8 text-center text-white relative">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-check-double text-2xl"></i>
                </div>
                <h3 class="text-xl font-black uppercase tracking-tighter">Detalhes do Pedido</h3>
                <button onclick="fecharModalPedido()" class="absolute top-6 right-6 text-white/50 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-8 space-y-8 max-h-[70vh] overflow-y-auto">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <p class="text-[9px] font-black text-gray-400 uppercase">Pedido ID</p>
                        <p id="det-venda-id" class="font-black text-gray-800"></p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <p class="text-[9px] font-black text-gray-400 uppercase">Data</p>
                        <p id="det-venda-data" class="font-black text-gray-800"></p>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="flex items-center gap-3">
                        <i class="fa-solid fa-user text-blue-500"></i>
                        <h4 id="det-cliente-nome" class="font-black text-gray-800 text-sm"></h4>
                    </div>
                    <div class="bg-blue-50/50 p-6 rounded-3xl border border-blue-100 space-y-2">
                        <div class="flex items-center gap-2 text-blue-600 mb-2">
                            <i class="fa-solid fa-truck-fast text-sm"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest">Endereço de Entrega</span>
                        </div>
                        <p id="det-cliente-end" class="text-sm font-black text-gray-700"></p>
                        <p id="det-cliente-bairro" class="text-xs font-bold text-gray-500"></p>
                        <p id="det-cliente-cidade" class="text-xs font-bold text-blue-500"></p>
                    </div>
                </div>
                <div class="space-y-4">
                    <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest">Produtos</h4>
                    <div id="det-venda-itens" class="space-y-3"></div>
                </div>
                <div class="pt-6 border-t flex justify-between items-center">
                    <span class="font-black text-gray-400 text-xs uppercase">Valor Total</span>
                    <span id="det-venda-total" class="text-2xl font-black text-emerald-500"></span>
                </div>
                <button onclick="fecharModalPedido()" class="w-full py-5 bg-gray-50 text-gray-400 rounded-2xl font-black text-xs uppercase tracking-widest">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        let allVendas = [], allClientes = [];
        let currentDeliveryFilter = 'pendente';

        function notify(title, message, type = "success") {
            const toast = document.getElementById('notification');
            const icon = document.getElementById('notification-icon');
            document.getElementById('notification-title').innerText = title;
            document.getElementById('notification-message').innerText = message;
            icon.className = `w-10 h-10 rounded-full flex items-center justify-center text-white ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
            icon.innerHTML = type === 'success' ? '<i class="fa-solid fa-check"></i>' : '<i class="fa-solid fa-xmark"></i>';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function loadAllData() {
            const { data: v } = await _supabase.from('pedidos').select('*').order('created_at', { ascending: false });
            const { data: c } = await _supabase.from('clientes').select('*').order('created_at', { ascending: false });
            
            allVendas = v || [];
            allClientes = c || [];

            renderEntregas();
            updateDeliveryBadge();
        }

        function updateDeliveryBadge() {
            const pendentes = allVendas.filter(v => v.pago && !v.entregue).length;
            const badge = document.getElementById('badge-entregas');
            if(pendentes > 0) {
                badge.innerText = pendentes;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function filterEntregas(status) {
            currentDeliveryFilter = status;
            document.getElementById('btn-ent-pendente').className = status === 'pendente' ? 'px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-blue-600 text-white shadow-lg shadow-blue-100' : 'px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-white text-gray-400 border border-gray-100';
            document.getElementById('btn-ent-entregue').className = status === 'entregue' ? 'px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-emerald-600 text-white shadow-lg shadow-emerald-100' : 'px-6 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest bg-white text-gray-400 border border-gray-100';
            renderEntregas();
        }

        function renderEntregas(filter = null) {
            const container = document.getElementById('entregas-list');
            const searchTerm = filter !== null ? filter : (document.getElementById('search-entregas')?.value || '');
            const filtered = allVendas.filter(v => {
                const isStatusMatch = v.pago && (currentDeliveryFilter === 'entregue' ? v.entregue === true : !v.entregue);
                if (!isStatusMatch) return false;
                
                const cliente = allClientes.find(c => c.id === v.usuario_id);
                const clienteNome = cliente ? cliente.nome.toLowerCase() : '';
                const itensMatch = v.itens.some(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()));
                
                return clienteNome.includes(searchTerm.toLowerCase()) || itensMatch || v.id.toString().includes(searchTerm);
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="p-12 text-center bg-white rounded-3xl border border-dashed border-gray-200"><i class="fa-solid fa-box-open text-4xl text-gray-200 mb-4"></i><p class="text-gray-400 font-bold uppercase text-[10px] tracking-widest">Nenhuma entrega ${currentDeliveryFilter === 'entregue' ? 'realizada' : 'pendente'}</p></div>`;
                return;
            }

            container.innerHTML = filtered.map(v => {
                const cliente = allClientes.find(c => c.id === v.usuario_id);
                const data = new Date(v.created_at).toLocaleDateString('pt-BR');
                const totalProdutos = v.itens.reduce((acc, item) => acc + (item.quantity || 1), 0);
                
                return `
                    <div class="bg-white rounded-3xl p-6 border border-gray-100 shadow-sm hover:shadow-md transition-all">
                        <div class="flex flex-col md:flex-row justify-between gap-6">
                            <div class="flex gap-5">
                                <div class="w-14 h-14 rounded-2xl ${v.entregue ? 'bg-emerald-50 text-emerald-500' : 'bg-blue-50 text-blue-500'} flex items-center justify-center shrink-0">
                                    <i class="fa-solid ${v.entregue ? 'fa-check-double' : 'fa-truck-ramp-box'} text-xl"></i>
                                </div>
                                <div>
                                    <div class="flex items-center gap-3 mb-1">
                                        <h4 class="font-black text-gray-800">#${v.id.toString().slice(-6)}</h4>
                                        <span class="text-[9px] font-black px-2 py-1 rounded-md bg-gray-100 text-gray-400 uppercase">${data}</span>
                                    </div>
                                    <p class="text-sm font-bold text-gray-500">${cliente ? cliente.nome : 'Cliente não encontrado'}</p>
                                    <div class="flex items-center gap-2 mt-2">
                                        <i class="fa-solid fa-location-dot text-[10px] text-blue-400"></i>
                                        <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">${cliente ? cliente.cidade : '---'}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="flex flex-wrap items-center gap-3 md:justify-end">
                                <button onclick="abrirModalPedido(${v.id})" class="px-5 py-3 rounded-xl bg-gray-50 text-gray-500 font-black text-[10px] uppercase tracking-widest hover:bg-gray-100 transition-all">Detalhes</button>
                                <button onclick="toggleEntregaStatus(${v.id}, ${!v.entregue})" class="px-6 py-3 rounded-xl ${v.entregue ? 'bg-amber-50 text-amber-600' : 'bg-emerald-500 text-white shadow-lg shadow-emerald-100'} font-black text-[10px] uppercase tracking-widest transition-all">
                                    ${v.entregue ? 'Marcar Pendente' : 'Confirmar Entrega'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function toggleEntregaStatus(id, status) {
            const { error } = await _supabase.from('pedidos').update({ entregue: status }).eq('id', id);
            if(!error) {
                notify("Sucesso", status ? "Entrega confirmada!" : "Pedido marcado como pendente.");
                loadAllData();
            } else {
                notify("Erro", "Falha ao atualizar status.", "error");
            }
        }

        function abrirModalPedido(id) {
            const v = allVendas.find(v => v.id === id);
            if(!v) return;
            const c = allClientes.find(c => c.id === v.usuario_id);
            
            document.getElementById('det-venda-id').innerText = `#${v.id}`;
            document.getElementById('det-venda-data').innerText = new Date(v.created_at).toLocaleDateString('pt-BR');
            document.getElementById('det-cliente-nome').innerText = c ? c.nome : '---';
            document.getElementById('det-cliente-end').innerText = c ? `${c.rua}, ${c.numero}` : '---';
            document.getElementById('det-cliente-bairro').innerText = c ? c.bairro : '---';
            document.getElementById('det-cliente-cidade').innerText = c ? c.cidade : '---';
            document.getElementById('det-venda-total').innerText = `R$ ${v.total.toFixed(2)}`;
            
            document.getElementById('det-venda-itens').innerHTML = v.itens.map(i => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-2xl">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-xl bg-white flex items-center justify-center border border-gray-100">
                            <img src="${i.image}" class="w-8 h-8 object-contain">
                        </div>
                        <div>
                            <p class="text-xs font-black text-gray-800">${i.name}</p>
                            <p class="text-[9px] font-bold text-gray-400 uppercase">Qtd: ${i.quantity || 1} | Tam: ${i.size || '---'}</p>
                        </div>
                    </div>
                    <p class="text-xs font-black text-gray-700">R$ ${(i.price * (i.quantity || 1)).toFixed(2)}</p>
                </div>
            `).join('');
            
            document.getElementById('modal-pedido').classList.add('active');
        }

        function fecharModalPedido() {
            document.getElementById('modal-pedido').classList.remove('active');
        }

        function logout() {
            localStorage.removeItem('admin_logged');
            location.reload();
        }

        window.onload = () => {
            // Registrar Service Worker para PWA
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado!', reg))
                    .catch(err => console.log('Erro ao registrar Service Worker', err));
            }

            if(localStorage.getItem('admin_logged') === 'true') {
                document.getElementById('login-overlay').classList.add('hidden');
                loadAllData();
            }
        };
    </script>
</body>
</html>
